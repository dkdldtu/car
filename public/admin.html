<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고렌트카 관리자</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <div class="container admin-container">
      <div class="admin-topbar">
        <div>
          <h1 class="section-title">관리자 페이지</h1>
          <p class="section-desc">예약 접수 목록 확인, 상태 변경, 삭제가 가능합니다.</p>
        </div>
        <div class="admin-actions">
          <a class="btn btn-outline dark" href="/">홈으로</a>
          <button id="logoutBtn" class="btn btn-outline dark" type="button">로그아웃</button>
        </div>
      </div>

      <section id="loginSection" class="card admin-login-card">
        <h2>관리자 로그인</h2>
        <form id="loginForm">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="관리자 비밀번호 입력" required />
          <button class="btn btn-primary wide" type="submit">로그인</button>
          <p id="loginMessage" class="form-message"></p>
        </form>
      </section>

      <section id="dashboardSection" class="hidden">
        <div class="card">
          <div class="dashboard-header">
            <h2>예약 접수 목록</h2>
            <button id="refreshBtn" class="btn btn-primary" type="button">새로고침</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>접수일</th>
                  <th>이름</th>
                  <th>연락처</th>
                  <th>대여일</th>
                  <th>반납일</th>
                  <th>차종</th>
                  <th>요청사항</th>
                  <th>상태</th>
                  <th>관리</th>
                </tr>
              </thead>
              <tbody id="reservationTableBody"></tbody>
            </table>
          </div>
          <p id="emptyMessage" class="empty-message hidden">아직 접수된 예약이 없습니다.</p>
        </div>
      </section>
    </div>

    <script src="/admin.js"></script>
  </body>
</html>
